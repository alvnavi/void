# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Flutter APK Release

on:
  push:
    # Se activará cuando subas una etiqueta (tag) que empiece con "v" (ej: v1.0, v2.1.3)
    tags:
      - 'v*'

# Necesitamos darle permisos al script para que pueda crear el Release y subir archivos
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Descarga el código de tu repositorio
      - uses: actions/checkout@v4

      # 2. Configura Java (básico para compilar aplicaciones Android)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Configura Flutter en su versión estable
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 4. Instala las dependencias de tu proyecto de Flutter
      - name: Install dependencies
        run: flutter pub get

      # 5. Compila el APK en modo Release
      - name: Build APK
        run: flutter build apk --release

      # 6. Crea el Release en GitHub y sube el APK automáticamente
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: build/app/outputs/flutter-apk/app-release.apk